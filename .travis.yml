language: node_js
node_js:
- '6'
install:
  - npm install -g npm@5.3.0 && npm -v
  - npm install --no-optional --no-save
script:
  - npm test && npm run package
deploy:
  skip_cleanup: true
  provider: releases
  api_key:
    secure: 
  file: dist/app.zip
  on:
    repo: DeskproApps/youtrack
    tags: true
addons:
  artifacts:
    debug: true
    paths:
      dist/app.zip
    target_paths:
      - /${TRAVIS_REPO_SLUG}/${TRAVIS_BUILD_NUMBER}