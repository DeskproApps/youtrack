language: node_js
node_js:
  - '6'
install:
  - npm install -g npm@5.3.0 && npm -v
  - npm install --no-optional --no-save
  - if [ "$TRAVIS_PULL_REQUEST_SLUG" == "DeskproApps/youtrack" ]; then curl -sL https://raw.githubusercontent.com/travis-ci/artifacts/master/install | bash; fi
script:
  - npm test && npm run package
after_success:
  - if [ "$TRAVIS_PULL_REQUEST_SLUG" == "DeskproApps/youtrack" ]; then artifacts upload --target-paths /${TRAVIS_REPO_SLUG}/${TRAVIS_BUILD_NUMBER}/${TRAVIS_NODE_VERSION} dist/app.zip && npm run dpat -- travis pr-comment . --s3target /${TRAVIS_REPO_SLUG}/${TRAVIS_BUILD_NUMBER}/${TRAVIS_NODE_VERSION} --debug ; fi
branches:
  only:
  - master
deploy:
  skip_cleanup: true
  provider: releases
  api_key:
    secure: 
  file: dist/app.zip
  on:
    repo: DeskproApps/youtrack
    tags: true

